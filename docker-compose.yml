services:
  mixmaster:
    build: .
    container_name: mixmaster-ai
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      USE_WEBHOOK: ${USE_WEBHOOK:-true}
    volumes:
      - mixmaster-data:/app/data
      - mixmaster-uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mixmaster-data:
  mixmaster-uploads:
